<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OmniPath AI - The Ultimate Career Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            display: block; 
            min-height: 100vh; 
            background: radial-gradient(circle at center, #161b22 0%, #06070a 100%); 
            margin: 0; 
            font-family: 'Inter', sans-serif;
            color: #c9d1d9;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--violet), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .hero { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: calc(100vh - 80px); 
            text-align: center; 
            padding: 20px; 
        }
        .hero h1 { 
            font-size: 72px; 
            margin-bottom: 20px; 
            font-weight: 800;
            letter-spacing: -2px;
        }
        .hero p { 
            font-size: 22px; 
            color: #8b949e; 
            max-width: 700px; 
            margin-bottom: 50px; 
            line-height: 1.6; 
        }
        .glow-button {
            background: linear-gradient(90deg, var(--violet), var(--pink));
            color: #fff;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 20px;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.4);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .glow-button:hover { 
            transform: translateY(-3px) scale(1.05); 
            box-shadow: 0 0 50px rgba(255, 0, 127, 0.6); 
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo"><i data-lucide="hexagon"></i> OmniPath AI</div>
        <a href="/dashboard" class="secondary-btn" style="text-decoration:none;">Go to Dashboard</a>
    </div>
    
    <div class="hero">
        <h1 class="text-gradient">Your Autonomous AI Career Team</h1>
        <p>18 AI Agents working in perfect harmony to optimize your resume, prepare you for interviews, and land you the perfect role in any sector.</p>
        <button onclick="window.location.href='/onboarding'" class="glow-button">
            Initialize Agents <i data-lucide="arrow-right"></i>
        </button>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
